version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=mongodb://mongo:27017/finguru
      - FRONTEND_URL=http://localhost:3000
      - ENVIRONMENT=development
      - DEBUG=True
    depends_on:
      - mongo
    volumes:
      - ./backend:/app
    command: >
      sh -c "pip install -r requirements.txt && 
             python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # MongoDB Database
  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: finguru
    volumes:
      - mongo_data:/data/db

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  mongo_data:

networks:
  default:
    name: finguru-network
